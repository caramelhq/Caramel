version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: CaramelLabs-PostGres-01
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: Caramellabs_db_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: CaramelLabs-Redis-01
    restart: always
    ports:
      - "6380:6379"

  lavalink:
    image: fredboat/lavalink:4.2.2
    container_name: CaramelLabs-Lavalink-01
    restart: always
    ports:
      - "2333:2333/tcp"
    volumes:
      - ./lavalink.yml:/opt/Lavalink/application.yml
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
    depends_on:
      - redis

volumes:
  postgres_data:
