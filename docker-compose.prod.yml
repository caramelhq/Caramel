version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: caramel-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: caramel-redis
    restart: always

  lavalink:
    image: fredboat/lavalink:4.2.2
    container_name: caramel-lavalink
    restart: always
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    depends_on:
      - redis

  bot:
    build: .
    container_name: caramel-bot
    restart: always
    env_file: .env.prod
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - lavalink

volumes:
  postgres_data:
