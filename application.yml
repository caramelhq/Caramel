server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # Plugin oficial de YouTube
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"
    # Plugin LavaSrc (Spotify/Apple Music)
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.topi.wtf/releases"
  server:
    password: "youshallnotpass"
    sources:
      youtube: false # El plugin oficial se encarga
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: false
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEB_REMIX
  
  lavasrc:
    providers:
      # Plantillas de búsqueda para encontrar el audio de Spotify en YouTube/SoundCloud
      - 'ytsearch:"%ISRC%"' # Busca por código único (lo más preciso)
      - 'ytsearch:"%TITLE% %ARTIST%"' # Busca por nombre si falla el ISRC
      - 'scsearch:"%TITLE% %ARTIST%"' # Fallback a SoundCloud
    sources:
      spotify: true
      applemusic: true
      deezer: false
      yandexmusic: false
      floweryts: false
      youtube: false # IMPORTANTE: lavasrc NO debe manejar youtube directamente
    spotify:
      clientId: "fccc1d1d32d7467786b9b4f89f5cc78c"
      clientSecret: "13b9516aea94463c92e3e29a04f15167"
      countryCode: "US"
      playlistPageLimit: 6
      albumPageLimit: 6

logging:
  level:
    root: INFO
    lavalink: INFO
